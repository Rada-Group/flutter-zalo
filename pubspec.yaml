    sdk: flutter
  dio: ^5.9.2
  socket_io_client: ^3.1.4
  crypto: ^3.0.6
  pointycastle: ^3.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
